<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff3b1f">
  <title>KringDasha — мем-галерея</title>
  <style>
    :root{
      --red:#ff2448;
      --orange:#ff7a00;
      --yellow:#ffe600;
      --green:#00df6f;
      --cyan:#00d5ff;
      --violet:#7a00ff;
      --ink:#120011;
      --paper:#fff8d6;
      --shadow:0 18px 50px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      font-family:Impact,"Arial Black","Trebuchet MS",system-ui,sans-serif;
      color:#fff;
      overflow-x:hidden;
      background:
        radial-gradient(circle at 10% 12%,rgba(255,230,0,.95) 0 7%,transparent 8%),
        radial-gradient(circle at 92% 18%,rgba(0,213,255,.9) 0 8%,transparent 9%),
        radial-gradient(circle at 16% 86%,rgba(0,223,111,.9) 0 9%,transparent 10%),
        linear-gradient(135deg,#ff4e9b 0%,#ff3b1f 30%,#8116e8 62%,#00a986 100%);
      background-attachment:fixed;
    }
    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(45deg,rgba(255,255,255,.10) 0 10px,rgba(0,0,0,.08) 10px 20px);
      opacity:.32;
      mix-blend-mode:overlay;
    }
    .kh{
      position:fixed;
      left:0;right:0;height:22px;z-index:20;pointer-events:none;
      background:linear-gradient(90deg,#120000,#c40017,#ffd000,#120000);
      box-shadow:0 0 18px rgba(0,0,0,.35);
    }
    .kh.top{top:0}.kh.bottom{bottom:0}
    .kh:before{
      content:"✹ ❧ ✹ ❧ ✹ ❧ ✹ ❧ ✹ ❧ ✹";
      position:absolute;inset:0;display:flex;align-items:center;justify-content:space-around;
      color:#fff1a2;font-size:15px;text-shadow:0 2px #000;
    }
    .page{position:relative;z-index:2;max-width:920px;margin:0 auto;padding:42px 16px 70px;text-align:center}
    h1{
      margin:8px 0 12px;
      font-size:clamp(46px,12vw,104px);
      line-height:.85;
      letter-spacing:.02em;
      text-transform:uppercase;
      text-shadow:0 5px 0 #000,0 0 20px rgba(255,230,0,.85);
    }
    .ticker{
      width:100%;overflow:hidden;margin:6px 0 16px;padding:8px 0;
      font-size:clamp(22px,6vw,40px);
      text-shadow:0 4px 0 #000;
      white-space:nowrap;
    }
    .ticker span{display:inline-block;animation:move 19s linear infinite}
    @keyframes move{to{transform:translateX(-50%)}}
    .stage{
      position:relative;
      border:6px solid #fff;
      border-radius:32px;
      padding:18px;
      background:linear-gradient(145deg,rgba(0,0,0,.42),rgba(0,120,70,.55));
      box-shadow:var(--shadow),inset 0 0 30px rgba(255,255,255,.14);
    }
    .boom{position:absolute;font-size:42px;filter:drop-shadow(0 5px #000);animation:bop 1.8s infinite ease-in-out;z-index:4}
    .b1{top:-18px;left:10px}.b2{top:-20px;right:18px;animation-delay:.4s}.b3{bottom:8px;left:-6px;animation-delay:.8s}.b4{bottom:5px;right:-8px;animation-delay:1.2s}
    @keyframes bop{50%{transform:scale(1.2) rotate(9deg)}}
    .anthemWrap{margin:0 0 16px;display:grid;gap:8px;justify-items:center}
    .anthemBtn{
      border:4px solid #fff;
      border-radius:999px;
      padding:14px 20px;
      background:linear-gradient(90deg,#ffffff 0 32%,#0057b8 32% 66%,#d52b1e 66% 100%);
      color:#111;
      font-family:"Trebuchet MS",system-ui,sans-serif;
      font-size:clamp(17px,4vw,24px);
      font-weight:1000;
      text-shadow:0 1px rgba(255,255,255,.65);
      box-shadow:0 8px 0 #000,0 14px 20px rgba(0,0,0,.25);
    }
    .anthemBtn.playing{filter:saturate(1.8);animation:pulseBtn .8s infinite alternate}
    @keyframes pulseBtn{to{transform:scale(1.03)}}
    .anthemStatus{
      font-family:"Trebuchet MS",system-ui,sans-serif;
      font-weight:900;
      font-size:13px;
      color:#fff7b0;
      text-shadow:0 2px 0 #000;
    }
    .photoBox{
      position:relative;
      width:100%;
      height:min(68vh,780px);
      min-height:430px;
      overflow:hidden;
      background:#050505;
      border-radius:24px;
      border:4px solid #050505;
      box-shadow:inset 0 0 0 3px rgba(255,255,255,.05);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .photoBox:before{
      content:"🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥";
      position:absolute;left:0;right:0;top:0;z-index:5;
      font-size:clamp(24px,7vw,42px);
      line-height:1;
      filter:drop-shadow(0 3px 0 #000);
      animation:fire .7s infinite alternate ease-in-out;
      pointer-events:none;
    }
    @keyframes fire{to{transform:translateY(-7px) scale(1.06)}}
    .photoBox img{
      display:block;
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      object-fit:contain;
      image-rendering:auto;
      border-radius:8px;
    }
    .meme{
      margin:18px 0 8px;
      color:var(--yellow);
      font-size:clamp(32px,8vw,62px);
      line-height:.96;
      text-shadow:0 5px 0 #000,0 0 18px rgba(255,0,60,.75);
      text-transform:uppercase;
    }
    .caption{
      margin:0 auto 14px;
      max-width:720px;
      font-family:"Trebuchet MS",system-ui,sans-serif;
      font-weight:900;
      font-size:clamp(14px,3.4vw,18px);
      color:#fff7b0;
      text-shadow:0 2px 0 #000;
    }
    .controls{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:14px}
    button{
      border:0;border-radius:18px;padding:15px 22px;cursor:pointer;
      background:linear-gradient(180deg,#fff200,#ffcf00);
      color:#1180db;
      font-family:"Trebuchet MS",system-ui,sans-serif;
      font-size:clamp(18px,4.5vw,26px);
      font-weight:1000;
      box-shadow:0 8px 0 #000,0 14px 20px rgba(0,0,0,.25);
    }
    button:active{transform:translateY(5px);box-shadow:0 3px 0 #000}
    .thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
    .thumb{
      aspect-ratio:1/1;padding:0;border-radius:14px;overflow:hidden;border:3px solid rgba(255,255,255,.65);
      background:#000;box-shadow:none;
    }
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .thumb.active{border-color:var(--yellow);box-shadow:0 0 0 4px var(--red)}
    .counter{
      margin-top:12px;
      font-family:"Trebuchet MS",system-ui,sans-serif;
      font-weight:900;
      color:#fff;
      text-shadow:0 2px 0 #000;
    }
    .spark{position:fixed;width:10px;height:10px;border-radius:999px;z-index:1;pointer-events:none;animation:spark 1.4s ease-out forwards}
    @keyframes spark{to{transform:translate(var(--dx),var(--dy)) scale(.1);opacity:0}}
    @media(max-width:520px){.page{padding-left:10px;padding-right:10px}.stage{padding:12px;border-width:5px}.photoBox{height:62vh;min-height:390px}.thumbs{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
  <div class="kh top"></div>
  <div class="kh bottom"></div>
  <main class="page">
    <h1>Kring Dasha</h1>
    <div class="ticker"><span>УЗБАГОЙСЯ · ПРЕВЕД МЕДВЕД · АФФТАР ЖЖОТ · НИЧОСИ · ЙА КРЕВЕДКО · ОНОТОЛЕ ОДОБРЯЭ · ПАЦТАЛОМ · КОТЭ НЕ ОДОБРЯЭ · УЗБАГОЙСЯ · ПРЕВЕД МЕДВЕД · АФФТАР ЖЖОТ · </span></div>
    <section class="stage">
      <div class="boom b1">💥</div><div class="boom b2">🎆</div><div class="boom b3">🎇</div><div class="boom b4">🔥</div>
      <div class="anthemWrap"><button class="anthemBtn" id="anthemBtn">🇷🇺 Включить гимн России</button><div class="anthemStatus" id="anthemStatus">На iPhone звук включится после нажатия</div></div>
      <div class="photoBox"><img id="photo" alt="Даша"></div>
      <div class="meme" id="meme"></div>
      <div class="caption" id="caption"></div>
      <div class="controls"><button id="prev">⬅ назад</button><button id="next">вперёд ➡</button></div>
      <div class="counter" id="counter"></div>
      <div class="thumbs" id="thumbs"></div>
    </section>
  </main>
  <script>
    const slides = [
      {src:'images/dasha-1.jpg?v=20260706-anthem-1', meme:'УЗБАГОЙСЯ', caption:'Главный закон старого Рунета: сначала узбагойся, потом листай дальше.'},
      {src:'images/dasha-2.jpg?v=20260706-anthem-1', meme:'ПРЕВЕД МЕДВЕД', caption:'Классика 2010-х: качество вебки есть, атмосфера есть, вопросов нет.'},
      {src:'images/dasha-3.jpg?v=20260706-anthem-1', meme:'АФФТАР ЖЖОТ', caption:'Когда кадр настолько мощный, что комментарии пишутся капсом.'},
      {src:'images/dasha-4.jpg?v=20260706-anthem-1', meme:'НИЧОСИ', caption:'Чипсы как аксессуар. Высокая мода старого интернета.'},
      {src:'images/dasha-5.jpg?v=20260706-anthem-1', meme:'ЙА КРЕВЕДКО', caption:'Снимок, который нельзя объяснить, но можно уважать.'},
      {src:'images/dasha-6.jpg?v=20260706-anthem-1', meme:'ОНОТОЛЕ ОДОБРЯЭ', caption:'Уровень удивления: 9000. Уровень мемности: ещё выше.'},
      {src:'images/dasha-7.jpg?v=20260706-anthem-1', meme:'ПАЦТАЛОМ', caption:'Нижний ракурс судьбы. Старый Рунет аплодирует стоя.'},
      {src:'images/dasha-8.jpg?v=20260706-anthem-1', meme:'КОТЭ НЕ ОДОБРЯЭ', caption:'Боевой режим активирован. Сайт переходит на уровень босса.'}
    ];
    let index = 0;
    const photo = document.getElementById('photo');
    const meme = document.getElementById('meme');
    const caption = document.getElementById('caption');
    const counter = document.getElementById('counter');
    const thumbs = document.getElementById('thumbs');
    const anthemBtn = document.getElementById('anthemBtn');
    const anthemStatus = document.getElementById('anthemStatus');
    let anthemPlaying = false;

    function render(){
      const s = slides[index];
      photo.src = s.src;
      photo.alt = s.meme;
      meme.textContent = s.meme;
      caption.textContent = s.caption;
      counter.textContent = `${index + 1} / ${slides.length}`;
      thumbs.innerHTML = slides.map((x,i)=>`<button class="thumb ${i===index?'active':''}" data-i="${i}"><img src="${x.src}" alt="${x.meme}"></button>`).join('');
      burst();
    }
    function next(){index=(index+1)%slides.length;render()}
    function prev(){index=(index-1+slides.length)%slides.length;render()}
    document.getElementById('next').onclick = next;
    document.getElementById('prev').onclick = prev;
    thumbs.onclick = e => { const b=e.target.closest('button[data-i]'); if(b){ index=+b.dataset.i; render(); } };
    document.addEventListener('keydown', e => { if(e.key==='ArrowRight')next(); if(e.key==='ArrowLeft')prev(); });

    function burst(){
      const colors=['#ff2448','#ffe600','#00df6f','#00d5ff','#fff'];
      const x=innerWidth*(.15+Math.random()*.7), y=innerHeight*(.08+Math.random()*.25);
      for(let n=0;n<18;n++){
        const sp=document.createElement('i');
        sp.className='spark'; sp.style.left=x+'px'; sp.style.top=y+'px'; sp.style.background=colors[Math.floor(Math.random()*colors.length)];
        const a=Math.random()*Math.PI*2, r=55+Math.random()*120;
        sp.style.setProperty('--dx', Math.cos(a)*r+'px'); sp.style.setProperty('--dy', Math.sin(a)*r+'px');
        document.body.appendChild(sp); setTimeout(()=>sp.remove(),1400);
      }
    }

    function noteFrequency(note){
      const map={C:0,Cs:1,D:2,Ds:3,E:4,F:5,Fs:6,G:7,Gs:8,A:9,As:10,B:11};
      const m=note.match(/^([A-G]s?)(\d)$/); if(!m) return 0;
      const semitone = map[m[1]] + (Number(m[2]) - 4) * 12 - 9;
      return 440 * Math.pow(2, semitone / 12);
    }
    function playTone(ctx, note, start, dur, gainValue){
      const freq = noteFrequency(note);
      if(!freq) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(gainValue, start + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start + dur + 0.04);
    }
    function playChord(ctx, notes, start, dur){
      notes.forEach(n=>playTone(ctx,n,start,dur,0.035));
    }
    async function playAnthem(){
      if(anthemPlaying) return;
      anthemPlaying = true;
      anthemBtn.classList.add('playing');
      anthemBtn.textContent = '🇷🇺 Гимн играет';
      anthemStatus.textContent = 'Синтезатор играет торжественную мелодию прямо в браузере';
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioCtx();
      await ctx.resume();
      const melody = [
        ['G4',.45],['C5',.70],['G4',.35],['A4',.35],['B4',.70],['E5',.70],['D5',.45],['C5',.45],['B4',.45],['A4',.45],['B4',.70],['G4',.80],
        ['C5',.70],['B4',.35],['A4',.35],['G4',.70],['A4',.70],['B4',.45],['C5',.45],['D5',.70],['E5',.80],
        ['D5',.45],['C5',.45],['B4',.70],['C5',.70],['D5',.45],['E5',.45],['F5',.75],['E5',.80],['D5',.50],['C5',.95]
      ];
      let t = ctx.currentTime + .08;
      for(const [note,dur] of melody){
        playTone(ctx,note,t,dur,0.085);
        if(['C5','E5','G4'].includes(note)) playChord(ctx,['C3','G3'],t,dur*.95);
        if(['D5','B4','A4'].includes(note)) playChord(ctx,['G3','D4'],t,dur*.95);
        t += dur * .92;
      }
      setTimeout(()=>{
        ctx.close();
        anthemPlaying=false;
        anthemBtn.classList.remove('playing');
        anthemBtn.textContent='🇷🇺 Включить гимн России';
        anthemStatus.textContent='Можно нажать ещё раз';
      }, Math.max(1000,(t-ctx.currentTime+0.6)*1000));
    }
    anthemBtn.onclick = playAnthem;

    setInterval(()=>document.visibilityState==='visible'&&next(),6000);
    render();
  </script>
</body>
</html>
